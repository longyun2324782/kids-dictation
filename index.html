<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能默写 - 2026版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --danger: #FF3B30; --success: #34C759; }
        body { font-family: -apple-system; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; }
        .header { width: 100%; padding: 40px 20px 20px; background: var(--card); border-bottom: 1px solid #D1D1D6; text-align: center; }
        .main-container { width: 95%; max-width: 800px; margin: 20px auto; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 默写区 */
        #word-display { font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; color: var(--primary); min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .canvas-wrapper { position: relative; width: 100%; height: 40vh; background: #fff; border: 2px solid #E5E5EA; border-radius: 16px; overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { height: 60px; border-radius: 14px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #E5E5EA; color: #3A3A3C; }
        .full-width { grid-column: span 2; }
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; min-height: 24px; }

        /* 真实日历样式 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-title { font-weight: bold; font-size: 1.2rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday { text-align: center; font-size: 0.8rem; color: #8E8E93; padding-bottom: 5px; }
        .day-box { aspect-ratio: 1; background: #F2F2F7; border-radius: 10px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; position: relative; }
        .day-box.completed { background: var(--success); color: white; }
        .day-box.today { border: 2px solid var(--primary); }
        .nav-btn { background: none; border: none; color: var(--primary); font-size: 1.2rem; padding: 10px; }

        /* 错题本与录入 */
        .input-area textarea { width: 100%; height: 80px; border: 1px solid #D1D1D6; border-radius: 12px; padding: 12px; font-size: 1rem; box-sizing: border-box; }
        .error-list { margin: 10px 0 0; padding: 0; list-style: none; }
        .error-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #F2F2F7; }
        .error-count { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.4rem;">高效默写训练中心</h1>
</div>

<div class="main-container">
    <!-- 默写区 -->
    <div class="card">
        <div id="word-display">准备挑战</div>
        <div id="status-msg"></div>
        <div class="canvas-wrapper">
            <canvas id="writeCanvas"></canvas>
        </div>
        <div class="button-group">
            <button class="btn btn-secondary" onclick="clearBoard()">擦除</button>
            <button class="btn btn-primary" id="submit-btn" onclick="recognizeAndCheck()" style="display:none;">提交批改</button>
            <button class="btn btn-primary full-width" id="start-btn" onclick="startSession()">开始今日任务</button>
        </div>
    </div>

    <!-- 录入区 -->
    <div class="card">
        <h3 style="margin-top:0">新词录入</h3>
        <textarea id="wordInput" placeholder="输入词语/句子，逗号隔开..."></textarea>
        <button class="btn btn-primary full-width" onclick="saveToLibrary()" style="margin-top:10px">存入库</button>
    </div>

    <!-- 错题本 (已去掉清空按钮) -->
    <div class="card">
        <h3 style="margin-top:0; color: var(--danger);">错题本 (成长足迹)</h3>
        <ul class="error-list" id="error-list"></ul>
    </div>

    <!-- 真实月历 -->
    <div class="card">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <div class="calendar-title" id="calendar-month">2026年5月</div>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- 由JS生成 -->
        </div>
    </div>
</div>

<script>
    // 数据初始化
    let db = JSON.parse(localStorage.getItem('dictation_ai_v3_db')) || { words: [], history: {}, errorLog: [] };
    let currentTask = [];
    let currentIdx = 0;
    let strokes = [];
    let currentStroke = [];
    
    // 日历当前显示的年月
    let viewDate = new Date(2026, 4, 1); // 默认设置在2026年5月 (月份从0开始，4代表5月)

    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d');
    
    function initCanvas() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#1C1C1E';
    }

    window.addEventListener('resize', initCanvas);
    setTimeout(initCanvas, 100);

    // 手写监听
    function getXY(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
        const p = getXY(e);
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        currentStroke = [[p.x, p.y, Date.now()]];
        e.preventDefault();
    });

    canvas.addEventListener('touchmove', (e) => {
        const p = getXY(e);
        ctx.lineTo(p.x, p.y); ctx.stroke();
        currentStroke.push([p.x, p.y, Date.now()]);
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => { strokes.push(currentStroke); });

    function clearBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes = [];
        document.getElementById('status-msg').innerText = "";
    }

    // AI识别
    async function recognizeAndCheck() {
        if (strokes.length === 0) return;
        document.getElementById('status-msg').innerText = "智能批改中...";
        const word = currentTask[currentIdx];
        
        const requestData = {
            "options": "enable_pre_space",
            "requests": [{
                "writing_guide": { "writing_area_width": canvas.width, "writing_area_height": canvas.height },
                "ink": strokes,
                "language": word.type === 'zh' ? "zh-Hans" : "en"
            }]
        };

        try {
            const response = await fetch('https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8', {
                method: 'POST',
                body: JSON.stringify(requestData)
            });
            const data = await response.json();
            
            if (data[0] === "SUCCESS") {
                const candidates = data[1][0][1];
                const answer = word.text.trim().toLowerCase();
                const isCorrect = candidates.some(c => c.toLowerCase() === answer);
                
                if (isCorrect) {
                    document.getElementById('status-msg').style.color = "var(--success)";
                    document.getElementById('status-msg').innerText = "✅ 极好！";
                    setTimeout(() => judge(true), 800);
                } else {
                    document.getElementById('status-msg').style.color = "var(--danger)";
                    document.getElementById('status-msg').innerText = `❌ 识别为: ${candidates[0]} (目标: ${word.text})`;
                    setTimeout(() => judge(false), 2000);
                }
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "网络拥堵，请协助手动判定";
            document.getElementById('status-msg').innerHTML += `<br><button onclick="judge(true)">对</button> <button onclick="judge(false)">错</button>`;
        }
    }

    function judge(isCorrect) {
        const word = currentTask[currentIdx];
        const original = db.words.find(w => w.text === word.text);
        const intervals = [0, 1, 2, 4, 7, 15, 30];

        if (isCorrect) {
            original.level = Math.min(original.level + 1, 6);
        } else {
            original.level = 0;
            recordError(word.text);
        }

        let next = new Date();
        next.setDate(next.getDate() + (isCorrect ? intervals[original.level] : 1));
        original.nextDate = next.toISOString().split('T')[0];

        save();
        currentIdx++;
        nextWord();
    }

    function recordError(text) {
        let entry = db.errorLog.find(e => e.text === text);
        if (entry) { entry.count++; } else { db.errorLog.push({ text: text, count: 1 }); }
        save();
        renderErrors();
    }

    function renderErrors() {
        const list = document.getElementById('error-list');
        list.innerHTML = '';
        db.errorLog.sort((a,b) => b.count - a.count).slice(0, 15).forEach(e => {
            const li = document.createElement('li');
            li.className = 'error-item';
            li.innerHTML = `<span>${e.text}</span><span class="error-count">${e.count}次错</span>`;
            list.appendChild(li);
        });
    }

    // 词库录入
    function saveToLibrary() {
        const str = document.getElementById('wordInput').value;
        if (!str) return;
        const list = str.split(/[,，]/).map(v => v.trim()).filter(v => v);
        list.forEach(text => {
            if (!db.words.find(w => w.text === text)) {
                db.words.push({ text: text, level: 0, nextDate: new Date().toISOString().split('T')[0], type: /[a-zA-Z]/.test(text) ? 'en' : 'zh' });
            }
        });
        save();
        alert('词库扩充成功！');
        document.getElementById('wordInput').value = '';
    }

    function startSession() {
        const today = new Date().toISOString().split('T')[0];
        currentTask = db.words.filter(w => w.nextDate <= today).slice(0, 40);
        if (currentTask.length === 0) { alert('今日计划已完成！'); return; }
        currentIdx = 0;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        nextWord();
    }

    function nextWord() {
        if (currentIdx >= currentTask.length) { finishTask(); return; }
        clearBoard();
        const word = currentTask[currentIdx];
        document.getElementById('word-display').innerText = "开始默写"; 
        const utter = new SpeechSynthesisUtterance(word.text);
        utter.lang = word.type === 'en' ? 'en-US' : 'zh-CN';
        window.speechSynthesis.speak(utter);
    }

    function finishTask() {
        const today = new Date().toISOString().split('T')[0];
        db.history[today] = true;
        save();
        document.getElementById('word-display').innerText = "🌟 完成今日修行";
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        renderCalendar();
    }

    // 真实日历生成逻辑
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('calendar-month');
        grid.innerHTML = '';
        
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        title.innerText = `${year}年${month + 1}月`;

        // 星期表头
        const weeks = ['日', '一', '二', '三', '四', '五', '六'];
        weeks.forEach(w => {
            const el = document.createElement('div');
            el.className = 'weekday';
            el.innerText = w;
            grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];

        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        // 填充日期
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const el = document.createElement('div');
            el.className = 'day-box';
            if (db.history[dateStr]) el.classList.add('completed');
            if (dateStr === todayStr) el.classList.add('today');
            el.innerText = day;
            grid.appendChild(el);
        }
    }

    function changeMonth(step) {
        viewDate.setMonth(viewDate.getMonth() + step);
        renderCalendar();
    }

    function save() { localStorage.setItem('dictation_ai_v3_db', JSON.stringify(db)); }

    // 初始化加载
    renderCalendar();
    renderErrors();
</script>
</body>
</html>
