<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>全自动智能默写 - 2026 稳定版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --danger: #FF3B30; --success: #34C759; }
        body { font-family: -apple-system; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; }
        .header { width: 100%; padding: 40px 20px 20px; background: var(--card); border-bottom: 1px solid #D1D1D6; text-align: center; }
        .main-container { width: 95%; max-width: 800px; margin: 20px auto; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #word-display { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; color: var(--primary); min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .stats-bar { display: flex; justify-content: space-around; font-size: 0.8rem; color: #666; margin-bottom: 15px; }
        .canvas-wrapper { position: relative; width: 100%; height: 45vh; background: #fff; border: 2px solid #E5E5EA; border-radius: 16px; overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { height: 60px; border-radius: 14px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #E5E5EA; color: #3A3A3C; }
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; min-height: 30px; }
        /* 日历 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday { text-align: center; font-size: 0.7rem; color: #8E8E93; }
        .day-box { aspect-ratio: 1; background: #F2F2F7; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
        .day-box.completed { background: var(--success); color: white; }
        .day-box.today { border: 2px solid var(--primary); }
        textarea { width: 100%; height: 80px; border: 1px solid #D1D1D6; border-radius: 12px; padding: 12px; font-size: 1rem; box-sizing: border-box; }
        .error-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #F2F2F7; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.3rem;">智能默写助手 (AI 驱动)</h1>
</div>

<div class="main-container">
    <div class="card">
        <div class="stats-bar">
            <span id="cn-stat">中文: 0/20</span>
            <span id="en-stat">英文: 0/20</span>
        </div>
        <div id="word-display">等待开始</div>
        <div id="status-msg"></div>
        <div class="canvas-wrapper">
            <canvas id="writeCanvas"></canvas>
        </div>
        <div class="button-group">
            <button class="btn btn-secondary" onclick="clearBoard()">清空</button>
            <button class="btn btn-primary" id="submit-btn" onclick="recognizeAndCheck()" style="display:none;">提交批改</button>
            <button class="btn btn-primary" id="start-btn" onclick="startSession()" style="grid-column: span 2;">开始今日默写任务</button>
        </div>
    </div>

    <div class="card">
        <h3>批量词库录入</h3>
        <textarea id="wordInput" placeholder="输入词语，逗号隔开..."></textarea>
        <button class="btn btn-primary" onclick="saveToLibrary()" style="width:100%; margin-top:10px; height:50px; border-radius:12px;">保存词库</button>
    </div>

    <div class="card">
        <h3 style="color: var(--danger);">错题本</h3>
        <div id="error-list"></div>
    </div>

    <div class="card">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="border:none;background:none;color:var(--primary);font-size:1.5rem;">❮</button>
            <b id="calendar-month">2026年5月</b>
            <button onclick="changeMonth(1)" style="border:none;background:none;color:var(--primary);font-size:1.5rem;">❯</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dictation_ai_v5_db')) || { words: [], history: {}, errorLog: [] };
    let currentTask = [];
    let currentIdx = 0;
    let strokes = [];
    let currentStroke = [];
    let viewDate = new Date(2026, 4, 1);

    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d');
    
    function initCanvas() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#1C1C1E';
    }
    window.addEventListener('resize', initCanvas);
    setTimeout(initCanvas, 100);

    function getXY(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
        const p = getXY(e);
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        currentStroke = [Math.round(p.x), Math.round(p.y)];
        e.preventDefault();
    });

    canvas.addEventListener('touchmove', (e) => {
        const p = getXY(e);
        ctx.lineTo(p.x, p.y); ctx.stroke();
        currentStroke.push(Math.round(p.x), Math.round(p.y));
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => {
        if(currentStroke.length > 2) {
            strokes.push(currentStroke);
        }
    });

    function clearBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes = [];
        document.getElementById('status-msg').innerText = "";
    }

    // 核心改进：使用 JSONP 方式绕过跨域拦截
    function recognizeAndCheck() {
        if (strokes.length === 0) return;
        const msg = document.getElementById('status-msg');
        msg.style.color = "#666";
        msg.innerText = "🔍 AI 正在批改...";

        const word = currentTask[currentIdx];
        const lang = word.type === 'zh' ? 'zh-Hans' : 'en';

        // 构造 Google Input API 所需的特殊格式
        const ink = JSON.stringify(strokes.map(s => {
            const x = [], y = [];
            for(let i=0; i<s.length; i+=2) { x.push(s[i]); y.push(s[i+1]); }
            return [x, y];
        }));

        // 创建唯一的全局回调函数名
        const callbackName = 'google_callback_' + Math.floor(Math.random() * 1000000);
        window[callbackName] = function(data) {
            if (data && data[0] === "SUCCESS") {
                const candidates = data[1][0][1];
                const answer = word.text.trim().toLowerCase();
                const isCorrect = candidates.some(c => c.toLowerCase() === answer);
                handleResult(isCorrect, candidates[0]);
            }
            delete window[callbackName];
            document.body.removeChild(script);
        };

        const url = `https://www.google.com/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8&lang=${lang}&ink=${encodeURIComponent(ink)}&cb=${callbackName}`;
        
        const script = document.createElement('script');
        script.src = url;
        script.onerror = () => {
            msg.innerText = "⚠️ 识别引擎连接失败，请检查网络";
        };
        document.body.appendChild(script);
    }

    function handleResult(isCorrect, bestCandidate) {
        const msg = document.getElementById('status-msg');
        if (isCorrect) {
            msg.style.color = "var(--success)";
            msg.innerText = "✅ 系统批改：正确";
            setTimeout(() => judge(true), 800);
        } else {
            msg.style.color = "var(--danger)";
            msg.innerText = `❌ 系统批改：错误 (识为:${bestCandidate || '?'})`;
            setTimeout(() => judge(false), 1500);
        }
    }

    function judge(isCorrect) {
        const word = currentTask[currentIdx];
        const original = db.words.find(w => w.text === word.text);
        const intervals = [0, 1, 2, 4, 7, 15, 30];

        if (isCorrect) {
            original.level = Math.min(original.level + 1, 6);
        } else {
            original.level = 0;
            recordError(word.text);
        }

        let next = new Date();
        next.setDate(next.getDate() + (isCorrect ? intervals[original.level] : 1));
        original.nextDate = next.toISOString().split('T')[0];

        save();
        currentIdx++;
        updateStats();
        nextWord();
    }

    function recordError(text) {
        let entry = db.errorLog.find(e => e.text === text);
        if (entry) { entry.count++; } else { db.errorLog.push({ text: text, count: 1 }); }
        save();
        renderErrors();
    }

    function renderErrors() {
        const list = document.getElementById('error-list');
        list.innerHTML = '';
        db.errorLog.sort((a,b) => b.count - a.count).slice(0, 8).forEach(e => {
            const div = document.createElement('div');
            div.className = 'error-item';
            div.innerHTML = `<span>${e.text}</span><span style="color:var(--danger)">${e.count}次错</span>`;
            list.appendChild(div);
        });
    }

    function startSession() {
        const today = new Date().toISOString().split('T')[0];
        let pending = db.words.filter(w => w.nextDate <= today);
        let cnTask = [], enTask = [], cnWeight = 0, enWeight = 0;

        for (let w of pending) {
            let weight = (w.type === 'zh' && w.text.length > 5) || (w.type === 'en' && w.text.includes(' ')) ? 2 : 1;
            if (w.type === 'zh' && cnWeight < 20) { cnTask.push(w); cnWeight += weight; }
            else if (w.type === 'en' && enWeight < 20) { enTask.push(w); enWeight += weight; }
            if (cnWeight >= 20 && enWeight >= 20) break;
        }

        currentTask = [...cnTask, ...enTask];
        if (currentTask.length === 0) { alert('今日复习已全部完成！'); return; }
        currentIdx = 0;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        updateStats();
        nextWord();
    }

    function updateStats() {
        const cnDone = currentTask.slice(0, currentIdx).filter(w => w.type === 'zh').length;
        const enDone = currentTask.slice(0, currentIdx).filter(w => w.type === 'en').length;
        const cnTotal = currentTask.filter(w => w.type === 'zh').length;
        const enTotal = currentTask.filter(w => w.type === 'en').length;
        document.getElementById('cn-stat').innerText = `中文: ${cnDone}/${cnTotal}`;
        document.getElementById('en-stat').innerText = `英文: ${enDone}/${enTotal}`;
    }

    function nextWord() {
        if (currentIdx >= currentTask.length) { finishTask(); return; }
        clearBoard();
        const word = currentTask[currentIdx];
        document.getElementById('word-display').innerText = "听音默写..."; 
        const utter = new SpeechSynthesisUtterance(word.text);
        utter.lang = word.type === 'en' ? 'en-US' : 'zh-CN';
        window.speechSynthesis.speak(utter);
    }

    function finishTask() {
        const today = new Date().toISOString().split('T')[0];
        db.history[today] = true;
        save();
        document.getElementById('word-display').innerText = "🎉 任务达成！";
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        renderCalendar();
    }

    function saveToLibrary() {
        const str = document.getElementById('wordInput').value;
        if (!str) return;
        const list = str.split(/[,，]/).map(v => v.trim()).filter(v => v);
        list.forEach(text => {
            if (!db.words.find(w => w.text === text)) {
                db.words.push({ text: text, level: 0, nextDate: new Date().toISOString().split('T')[0], type: /[a-zA-Z]/.test(text) ? 'en' : 'zh' });
            }
        });
        save();
        alert('词库同步成功！');
        document.getElementById('wordInput').value = '';
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('calendar-month');
        grid.innerHTML = '';
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        title.innerText = `${year}年${month + 1}月`;
        const weeks = ['日', '一', '二', '三', '四', '五', '六'];
        weeks.forEach(w => {
            const el = document.createElement('div'); el.className = 'weekday'; el.innerText = w; grid.appendChild(el);
        });
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const el = document.createElement('div');
            el.className = 'day-box' + (db.history[dateStr] ? ' completed' : '');
            if (dateStr === todayStr) el.classList.add('today');
            el.innerText = day;
            grid.appendChild(el);
        }
    }

    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
    function save() { localStorage.setItem('dictation_ai_v5_db', JSON.stringify(db)); }

    renderCalendar();
    renderErrors();
</script>
</body>
</html>
