<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 自动默写 - 终极修复版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --danger: #FF3B30; --success: #34C759; }
        body { font-family: -apple-system; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; }
        .header { width: 100%; padding: 40px 20px 10px; background: var(--card); border-bottom: 1px solid #D1D1D6; text-align: center; }
        .main-container { width: 95%; max-width: 800px; margin: 15px auto; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* 诊断日志窗口 - 关键 */
        #debug-log { font-size: 0.7rem; color: #888; background: #000; color: #0f0; padding: 5px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; min-height: 20px; overflow: hidden; }

        #word-display { font-size: 2.5rem; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 10px; }
        .canvas-wrapper { width: 100%; height: 40vh; background: #fff; border: 2px solid #E5E5EA; border-radius: 16px; position: relative; touch-action: none; }
        canvas { width: 100%; height: 100%; }
        
        .btn { height: 60px; border-radius: 14px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #E5E5EA; color: #3A3A3C; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { aspect-ratio: 1; background: #eee; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .day-box.done { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.2rem;">2026 智能默写系统</h1>
</div>

<div class="main-container">
    <div id="debug-log">系统就绪，等待指令...</div>
    
    <div class="card">
        <div id="word-display">等待开始</div>
        <div class="canvas-wrapper">
            <canvas id="writeCanvas"></canvas>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" onclick="clearBoard()">重写</button>
            <button class="btn btn-primary" id="submit-btn" onclick="startAI()" style="display:none; flex:2;">提交批改</button>
        </div>
        <button id="start-btn" class="btn btn-primary" onclick="startSession()">开始今日任务</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0;">词库录入</h3>
        <textarea id="wordInput" style="width:100%; height:60px; border-radius:10px; padding:10px;" placeholder="词语用逗号隔开..."></textarea>
        <button class="btn btn-primary" style="height:45px;" onclick="saveWords()">同步词库</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; color:var(--danger)">错题本</h3>
        <div id="error-list" style="font-size:0.9rem;"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b id="cal-title">2026年5月</b>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dict_v7_db')) || { words: [], history: {}, errors: [] };
    let currentTask = [], currentIdx = 0, strokes = [], currentStroke = [];
    let viewDate = new Date(2026, 4, 1);

    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d');
    const log = (msg) => { document.getElementById('debug-log').innerText = `LOG: ${msg}`; };

    function initCanvas() {
        const r = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * r;
        canvas.height = canvas.offsetHeight * r;
        ctx.scale(r, r);
        ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', initCanvas);
    setTimeout(initCanvas, 100);

    // 绘图监听
    canvas.addEventListener('touchstart', e => {
        const rect = canvas.getBoundingClientRect();
        const p = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        currentStroke = [[Math.round(p.x)], [Math.round(p.y)], [Date.now()]];
        e.preventDefault();
    });

    canvas.addEventListener('touchmove', e => {
        const rect = canvas.getBoundingClientRect();
        const p = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        ctx.lineTo(p.x, p.y); ctx.stroke();
        currentStroke[0].push(Math.round(p.x));
        currentStroke[1].push(Math.round(p.y));
        currentStroke[2].push(Date.now());
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => {
        if (currentStroke[0].length > 1) strokes.push(currentStroke);
    });

    function clearBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes = [];
        log("画布已清空");
    }

    // 核心AI：修复了坐标嵌套结构的核心问题
    function startAI() {
        if (strokes.length === 0) return;
        log("连接服务器中...");
        
        const word = currentTask[currentIdx];
        const cbName = 'jsonp_cb_' + Date.now();
        
        // 核心修正：Google API 要求的 [[x...],[y...],[t...]] 结构
        const inkData = JSON.stringify(strokes);

        window[cbName] = (data) => {
            if (data && data[0] === "SUCCESS") {
                const candidates = data[1][0][1];
                const target = word.text.trim().toLowerCase();
                const isMatch = candidates.some(c => c.toLowerCase() === target);
                log(`识别完成，结果：${candidates[0]}`);
                applyJudge(isMatch, candidates[0]);
            }
            cleanup();
        };

        const cleanup = () => {
            delete window[cbName];
            const s = document.getElementById(cbName);
            if (s) s.remove();
        };

        const script = document.createElement('script');
        script.id = cbName;
        // 使用更宽松的 autotext 接口
        script.src = `https://www.google.com/inputtools/request?ime=handwriting&app=autotext&cs=1&oe=UTF-8&lang=${word.type === 'zh' ? 'zh-Hans' : 'en'}&ink=${encodeURIComponent(inkData)}&cb=${cbName}`;
        script.onerror = () => {
            log("网络错误，重连中...");
            setTimeout(startAI, 2000);
            cleanup();
        };
        document.body.appendChild(script);
    }

    function applyJudge(isOk, guess) {
        const word = currentTask[currentIdx];
        const target = db.words.find(w => w.text === word.text);
        const steps = [0, 1, 2, 4, 7, 15, 30];

        if (isOk) {
            target.level = Math.min(target.level + 1, 6);
            document.getElementById('word-display').innerText = "✅ 正确！";
            document.getElementById('word-display').style.color = "var(--success)";
        } else {
            target.level = 0;
            const err = db.errors.find(e => e.text === word.text);
            if (err) err.count++; else db.errors.push({ text: word.text, count: 1 });
            document.getElementById('word-display').innerText = `❌ 识为:${guess || '?'}`;
            document.getElementById('word-display').style.color = "var(--danger)";
        }

        let next = new Date();
        next.setDate(next.getDate() + (isOk ? steps[target.level] : 1));
        target.nextDate = next.toISOString().split('T')[0];
        
        save();
        currentIdx++;
        setTimeout(() => {
            document.getElementById('word-display').style.color = "var(--primary)";
            nextWord();
        }, 1500);
    }

    function startSession() {
        const today = new Date().toISOString().split('T')[0];
        let pool = db.words.filter(w => w.nextDate <= today);
        let cn = [], en = [], cw = 0, ew = 0;
        
        for (let w of pool) {
            let weight = (w.type === 'zh' && w.text.length > 5) || (w.type === 'en' && w.text.includes(' ')) ? 2 : 1;
            if (w.type === 'zh' && cw < 20) { cn.push(w); cw += weight; }
            else if (w.type === 'en' && ew < 20) { en.push(w); ew += weight; }
            if (cw >= 20 && ew >= 20) break;
        }

        currentTask = [...cn, ...en];
        if (currentTask.length === 0) { log("今日无任务"); return; }
        
        currentIdx = 0;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        nextWord();
    }

    function nextWord() {
        if (currentIdx >= currentTask.length) {
            db.history[new Date().toISOString().split('T')[0]] = true;
            save(); render();
            document.getElementById('word-display').innerText = "🏁 任务完成";
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            return;
        }
        clearBoard();
        const word = currentTask[currentIdx];
        document.getElementById('word-display').innerText = "请听写...";
        log(`正在读音: ${word.text}`);
        const u = new SpeechSynthesisUtterance(word.text);
        u.lang = word.type === 'zh' ? 'zh-CN' : 'en-US';
        window.speechSynthesis.speak(u);
    }

    function saveWords() {
        const v = document.getElementById('wordInput').value;
        if (!v) return;
        v.split(/[,，]/).map(t => t.trim()).filter(t => t).forEach(t => {
            if (!db.words.find(w => w.text === t)) {
                db.words.push({ text: t, level: 0, nextDate: new Date().toISOString().split('T')[0], type: /[a-zA-Z]/.test(t) ? 'en' : 'zh' });
            }
        });
        save(); log("词库已保存"); document.getElementById('wordInput').value = '';
    }

    function render() {
        const g = document.getElementById('calendar'); g.innerHTML = '';
        const y = 2026, m = 4; // 2026年5月
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        for (let i = 0; i < first; i++) g.appendChild(document.createElement('div'));
        for (let d = 1; d <= last; d++) {
            const ds = `${y}-05-${String(d).padStart(2,'0')}`;
            const b = document.createElement('div');
            b.className = 'day-box' + (db.history[ds] ? ' done' : '');
            b.innerText = d; g.appendChild(b);
        }
        document.getElementById('error-list').innerHTML = db.errors.sort((a,b)=>b.count-a.count).slice(0,5).map(e => `<div>${e.text} (${e.count}次)</div>`).join('');
    }

    function save() { localStorage.setItem('dict_v7_db', JSON.stringify(db)); }
    render();
</script>
</body>
</html>
