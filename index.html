<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026 智能默写 - 原生适配版</title>
    <style>
        :root { --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 94%; max-width: 800px; margin: 20px auto; padding-bottom: 50px; }
        .card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* 进度显示 */
        .stats { display: flex; justify-content: space-around; font-size: 0.9rem; color: #888; margin-bottom: 20px; font-weight: 600; }
        #word-display { font-size: 2.5rem; font-weight: 800; color: var(--primary); text-align: center; min-height: 60px; margin-bottom: 10px; }
        
        /* 核心写字区：巨大的输入框，专为 Apple Pencil 设计 */
        #scribble-input { 
            width: 100%; height: 35vh; font-size: 2.2rem; text-align: center;
            border: 2px dashed #D1D1D6; border-radius: 20px; outline: none;
            background: #FAFAFA; display: none; padding: 20px; box-sizing: border-box;
            transition: all 0.3s;
        }
        #scribble-input:focus { border: 2px solid var(--primary); background: #fff; box-shadow: 0 0 15px rgba(0,122,255,0.1); }
        
        .btn { height: 60px; border-radius: 15px; border: none; font-size: 1.2rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; margin-top: 15px; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }

        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 35px; font-size: 1.2rem; }

        /* 2026年5月日历 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-box { aspect-ratio: 1; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 500; }
        .day-box.done { background: var(--success); color: #fff; }
        .day-box.today { border: 2px solid var(--primary); }
        
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 1rem; box-sizing: border-box; margin-top: 10px; }
        .error-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 1rem; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <div class="stats">
            <span id="cn-progress">中文任务: 0/20分</span>
            <span id="en-progress">英文任务: 0/20分</span>
        </div>
        <div id="word-display">准备挑战</div>
        <div id="status-msg"></div>

        <!-- 核心：孩子用 Apple Pencil 直接在这里写，iPad 自动转文字 -->
        <textarea id="scribble-input" placeholder="请在此处手写单词或句子..." spellcheck="false"></textarea>
        
        <button id="submit-btn" class="btn btn-primary" onclick="autoCheck()" style="display:none;">提交批改</button>
        <button id="start-btn" class="btn btn-primary" onclick="startSession()">开始今日任务 (20中+20英)</button>
    </div>

    <div class="card">
        <h4 style="margin:0">批量词库导入</h4>
        <textarea id="wordInput" placeholder="输入内容用逗号隔开，长句自动计2分..."></textarea>
        <button class="btn btn-primary" style="height:45px; font-size:1rem;" onclick="saveWords()">存入本地词库</button>
    </div>

    <div class="card">
        <h4 style="margin:0; color:var(--danger)">错题集 (本地记录)</h4>
        <div id="error-list"></div>
    </div>

    <div class="card">
        <div class="calendar-header">
            <span onclick="moveMonth(-1)" style="color:var(--primary); cursor:pointer;">❮</span>
            <b id="cal-title" style="font-size:1.2rem;">2026年5月</b>
            <span onclick="moveMonth(1)" style="color:var(--primary); cursor:pointer;">❯</span>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dict_v2026_final')) || { words: [], history: {}, errors: [] };
    let task = [], idx = 0;
    let viewDate = new Date(2026, 4, 1);
    const inputArea = document.getElementById('scribble-input');

    // 核心自动批改：纯本地对比，100% 准确，不卡顿
    function autoCheck() {
        const userValue = inputArea.value.trim().toLowerCase();
        const target = task[idx].text.trim().toLowerCase();
        const msg = document.getElementById('status-msg');

        if (!userValue) return;

        if (userValue === target) {
            msg.innerText = "✅ 太棒了，完全正确！";
            msg.style.color = "var(--success)";
            handleResult(true);
        } else {
            msg.innerText = `❌ 记错了（答案：${task[idx].text}）`;
            msg.style.color = "var(--danger)";
            handleResult(false);
        }
    }

    function handleResult(isOk) {
        const word = task[idx];
        const item = db.words.find(w => w.text === word.text);
        const intervals = [0, 1, 2, 4, 7, 15, 30];

        if (isOk) {
            item.level = Math.min((item.level || 0) + 1, 6);
        } else {
            item.level = 0; // 错误则重置
            let err = db.errors.find(e => e.text === word.text);
            if (err) err.count++; else db.errors.push({text: word.text, count: 1});
        }

        let next = new Date();
        next.setDate(next.getDate() + (isOk ? intervals[item.level] : 1));
        item.nextDate = next.toISOString().split('T')[0];
        
        idx++;
        save();
        setTimeout(nextWord, 1500);
    }

    // 筛选逻辑：20中+20英权重，句子算2分
    function startSession() {
        const today = new Date().toISOString().split('T')[0];
        let pool = db.words.filter(w => !w.nextDate || w.nextDate <= today);
        
        let cn = [], en = [], cw = 0, ew = 0;
        for (let w of pool) {
            let weight = (w.type === 'zh' && w.text.length > 5) || (w.type === 'en' && w.text.includes(' ')) ? 2 : 1;
            if (w.type === 'zh' && cw < 20) { cn.push(w); cw += weight; }
            else if (w.type === 'en' && ew < 20) { en.push(w); ew += weight; }
        }

        task = [...cn, ...en];
        if (task.length === 0) { alert("今天太棒了，任务已全部达成！"); return; }
        
        idx = 0;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        inputArea.style.display = 'block';
        nextWord();
    }

    function nextWord() {
        if (idx >= task.length) {
            db.history[new Date().toISOString().split('T')[0]] = true;
            save(); render();
            document.getElementById('word-display').innerText = "🏁 今日达成！";
            inputArea.style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            return;
        }
        inputArea.value = "";
        document.getElementById('status-msg').innerText = "";
        const word = task[idx];
        document.getElementById('word-display').innerText = "请听写...";
        
        // 更新进度
        const cnd = task.slice(0, idx).filter(w => w.type === 'zh').length;
        const end = task.slice(0, idx).filter(w => w.type === 'en').length;
        document.getElementById('cn-progress').innerText = `中文: ${cnd}/20分`;
        document.getElementById('en-progress').innerText = `英文: ${end}/20分`;

        const u = new SpeechSynthesisUtterance(word.text);
        u.lang = word.type === 'zh' ? 'zh-CN' : 'en-US';
        window.speechSynthesis.speak(u);
        inputArea.focus();
    }

    function saveWords() {
        const v = document.getElementById('wordInput').value;
        if (!v) return;
        v.split(/[,，]/).map(t => t.trim()).filter(t => t).forEach(t => {
            if (!db.words.find(w => w.text === t)) {
                db.words.push({ text: t, level: 0, type: /[a-zA-Z]/.test(t) ? 'en' : 'zh' });
            }
        });
        save(); alert("同步成功，请开始任务！");
        document.getElementById('wordInput').value = "";
    }

    function render() {
        const g = document.getElementById('calendar'); g.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('cal-title').innerText = `${y}年${m+1}月`;
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];

        for (let i = 0; i < first; i++) g.appendChild(document.createElement('div'));
        for (let d = 1; d <= last; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const b = document.createElement('div');
            b.className = 'day-box' + (db.history[ds] ? ' done' : '');
            if(ds === todayStr) b.classList.add('today');
            b.innerText = d; g.appendChild(b);
        }
        document.getElementById('error-list').innerHTML = db.errors.sort((a,b)=>b.count-a.count).slice(0,5).map(e => `<div class="error-item"><span>${e.text}</span><span style="color:var(--danger)">${e.count}次错</span></div>`).join('');
    }

    function moveMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }
    function save() { localStorage.setItem('dict_v2026_final', JSON.stringify(db)); }
    render();
</script>
</body>
</html>
