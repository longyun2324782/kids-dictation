<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 智能默写 (原生适配版)</title>
    <style>
        :root { --primary: #007AFF; --success: #34C759; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #F2F2F7; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 92%; max-width: 600px; margin: 20px auto; padding-bottom: 50px; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* 进度条 */
        .stats { display: flex; justify-content: space-around; font-size: 0.8rem; color: #888; margin-bottom: 15px; }
        
        /* 核心输入区 */
        #word-display { font-size: 2.2rem; font-weight: bold; color: var(--primary); text-align: center; min-height: 50px; margin-bottom: 15px; }
        #answer-input { 
            width: 100%; height: 80px; font-size: 1.8rem; text-align: center;
            border: 2px solid #E5E5EA; border-radius: 15px; outline: none;
            background: #FAFAFA; transition: 0.3s;
        }
        #answer-input:focus { border-color: var(--primary); background: #FFF; }
        
        .btn { height: 55px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; margin-top: 15px; }
        
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; min-height: 25px; }

        /* 日历 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .day-box { aspect-ratio: 1; background: #F2F2F7; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .day-box.done { background: var(--success); color: #fff; }
        .day-box.today { border: 2px solid var(--primary); }
        
        textarea { width: 100%; height: 60px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        .error-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <div class="stats">
            <span id="cn-stat">中文: 0/20分</span>
            <span id="en-stat">英文: 0/20分</span>
        </div>
        <div id="word-display">准备挑战</div>
        <!-- 核心：让孩子在这个框里手写，iPad会自动转成字 -->
        <input type="text" id="answer-input" placeholder="请手写或输入答案" autocomplete="off" style="display:none;">
        <div id="status-msg"></div>
        
        <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()" style="display:none;">提交批改</button>
        <button id="start-btn" class="btn btn-primary" onclick="startSession()">开始今日任务</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px">词库录入 (逗号隔开)</h4>
        <textarea id="wordInput" placeholder="苹果,Apple,学习..."></textarea>
        <button class="btn btn-primary" style="height:40px; margin-top:10px;" onclick="saveWords()">存入本地词库</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px; color:var(--danger)">错题记录</h4>
        <div id="error-list"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
            <span onclick="moveMonth(-1)">❮</span>
            <span id="cal-title">2026年5月</span>
            <span onclick="moveMonth(1)">❯</span>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dict_vFinal_Stable')) || { words: [], history: {}, errors: [] };
    let task = [], idx = 0;
    let viewDate = new Date(2026, 4, 1);

    const inputField = document.getElementById('answer-input');

    // 核心判定逻辑：完全本地化，不联网，不卡顿
    function checkAnswer() {
        const userValue = inputField.value.trim().toLowerCase();
        const targetWord = task[idx].text.trim().toLowerCase();
        const msg = document.getElementById('status-msg');

        if (!userValue) return;

        if (userValue === targetWord) {
            msg.innerText = "✅ 正确！";
            msg.style.color = "var(--success)";
            handleResult(true);
        } else {
            msg.innerText = `❌ 错误 (正确答案: ${task[idx].text})`;
            msg.style.color = "var(--danger)";
            handleResult(false);
        }
    }

    function handleResult(isOk) {
        const word = task[idx];
        const item = db.words.find(w => w.text === word.text);
        const intervals = [0, 1, 2, 4, 7, 15, 30];

        if (isOk) {
            item.level = Math.min((item.level || 0) + 1, 6);
        } else {
            item.level = 0;
            let err = db.errors.find(e => e.text === word.text);
            if (err) err.count++; else db.errors.push({ text: word.text, count: 1 });
        }

        let next = new Date();
        next.setDate(next.getDate() + (isOk ? intervals[item.level] : 1));
        item.nextDate = next.toISOString().split('T')[0];
        
        idx++;
        save();
        setTimeout(nextWord, 1500);
    }

    function startSession() {
        const today = new Date().toISOString().split('T')[0];
        let pool = db.words.filter(w => !w.nextDate || w.nextDate <= today);
        
        let cn = [], en = [], cw = 0, ew = 0;
        for (let w of pool) {
            let weight = (w.type === 'zh' && w.text.length > 5) || (w.type === 'en' && w.text.includes(' ')) ? 2 : 1;
            if (w.type === 'zh' && cw < 20) { cn.push(w); cw += weight; }
            else if (w.type === 'en' && ew < 20) { en.push(w); ew += weight; }
        }

        task = [...cn, ...en];
        if (task.length === 0) { alert("今天没有任务，录入点新词吧！"); return; }
        
        idx = 0;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        inputField.style.display = 'block';
        nextWord();
    }

    function nextWord() {
        if (idx >= task.length) {
            db.history[new Date().toISOString().split('T')[0]] = true;
            save(); render();
            document.getElementById('word-display').innerText = "🏁 任务完成！";
            inputField.style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            return;
        }
        inputField.value = "";
        document.getElementById('status-msg').innerText = "";
        const word = task[idx];
        document.getElementById('word-display').innerText = "请默写词语";
        
        // 更新进度
        const cnd = task.slice(0, idx).filter(w => w.type === 'zh').length;
        const end = task.slice(0, idx).filter(w => w.type === 'en').length;
        document.getElementById('cn-stat').innerText = `中文: ${cnd}/20分`;
        document.getElementById('en-stat').innerText = `英文: ${end}/20分`;

        const u = new SpeechSynthesisUtterance(word.text);
        u.lang = word.type === 'zh' ? 'zh-CN' : 'en-US';
        window.speechSynthesis.speak(u);
        inputField.focus();
    }

    function saveWords() {
        const v = document.getElementById('wordInput').value;
        if (!v) return;
        v.split(/[,，]/).map(t => t.trim()).filter(t => t).forEach(t => {
            if (!db.words.find(w => w.text === t)) {
                db.words.push({ text: t, level: 0, type: /[a-zA-Z]/.test(t) ? 'en' : 'zh' });
            }
        });
        save(); alert("同步成功！");
        document.getElementById('wordInput').value = "";
    }

    function render() {
        const g = document.getElementById('calendar'); g.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('cal-title').innerText = `${y}年${m+1}月`;
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];

        for (let i = 0; i < first; i++) g.appendChild(document.createElement('div'));
        for (let d = 1; d <= last; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const b = document.createElement('div');
            b.className = 'day-box' + (db.history[ds] ? ' done' : '');
            if(ds === todayStr) b.classList.add('today');
            b.innerText = d; g.appendChild(b);
        }
        document.getElementById('error-list').innerHTML = db.errors.sort((a,b)=>b.count-a.count).slice(0,5).map(e => `<div class="error-item"><span>${e.text}</span><span style="color:var(--danger)">${e.count}次错</span></div>`).join('');
    }

    function moveMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }
    function save() { localStorage.setItem('dict_vFinal_Stable', JSON.stringify(db)); }
    render();
</script>
</body>
</html>
